<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Country / Person Profiler</title>

  <!-- Bootstrap FIRST -->
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <link rel="stylesheet" href="src/css/style.css">
</head>

<body>

<div class="container">
  <h1 class="text-center">Country & Person Explorer</h1>
  <hr>

  <div class="row">
    <div class="col-md-6">
      <input type="text" id="searchInput" class="form-control input-lg" placeholder="Search...">
    </div>

    <div class="col-md-6">
      <select id="dropdown" class="form-control input-lg">
        <option value="">Select an option</option>
      </select>
    </div>
  </div>

  <br>

  <div id="output" class="text-center">
    <h3>Search or select a country/person</h3>
  </div>
</div>

<!-- Scripts -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
<script src="src/js/script.js"></script>

</body>

</html>
